<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1B3D"/>
      <stop offset="0.6" stop-color="#0C2E7C"/>
      <stop offset="1" stop-color="#123B8F"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8FF0FF"/>
      <stop offset="0.5" stop-color="#39E3FF"/>
      <stop offset="1" stop-color="#0B2E7A"/>
    </linearGradient>
    <clipPath id="inner"><circle cx="50" cy="50" r="39"/></clipPath>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- the water-O mark (BLUEOS brand system) -->
  <g transform="translate(335,70) scale(1.3)">
    <g clip-path="url(#inner)">
      <path d="M-4,54 C18,44 34,44 52,52 C70,60 84,60 104,50 L104,104 L-4,104 Z" fill="url(#water)"/>
    </g>
    <circle cx="50" cy="50" r="44.5" fill="none" stroke="#FFFFFF" stroke-width="11"/>
  </g>
  <text x="400" y="318" text-anchor="middle" fill="#FFFFFF"
        font-family="Arial, Helvetica, sans-serif" font-weight="800"
        font-size="64" letter-spacing="-2">BLUEOS</text>
  <text x="400" y="366" text-anchor="middle" fill="#5AC8EC"
        font-family="Consolas, Menlo, monospace" font-size="19" letter-spacing="9">OPERATION SYSTEM</text>
</svg>
